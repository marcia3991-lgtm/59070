<!DOCTYPE html>
<html lang="zh-TW">

<meta charset="UTF-8">

<title>品管中心大事記</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --ink: #1a1a2e;
    --gold: #c9a84c;
    --deep: #0f3460;
    --cream: #faf7f0;
    --border: rgba(201,168,76,0.3);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--cream); color: var(--ink); min-height: 100vh; }

  .hero {
    background: var(--deep);
    position: relative;
    overflow: hidden;
    padding: 72px 40px 56px;
    text-align: center;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(201,168,76,0.15) 0%, transparent 70%),
      radial-gradient(ellipse 40% 40% at 10% 100%, rgba(201,168,76,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 40% 40% at 90% 100%, rgba(201,168,76,0.08) 0%, transparent 60%);
  }
  .hero-pattern {
    position: absolute;
    inset: 0;
    opacity: 0.04;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 39px, rgba(201,168,76,1) 39px, rgba(201,168,76,1) 40px),
      repeating-linear-gradient(90deg, transparent, transparent 39px, rgba(201,168,76,1) 39px, rgba(201,168,76,1) 40px);
  }
  .hero-inner { position: relative; z-index: 1; max-width: 860px; margin: 0 auto; }
  .hero-badge {
    display: inline-block;
    border: 1px solid var(--gold);
    color: var(--gold);
    font-family: 'Noto Serif TC', serif;
    font-size: 11px;
    letter-spacing: 4px;
    padding: 6px 20px;
    margin-bottom: 24px;
  }
  .hero h1 {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(32px, 5.5vw, 58px);
    font-weight: 700;
    color: #fff;
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .hero h1 span { color: var(--gold); }
  .hero-sub {
    font-family: 'Noto Serif TC', serif;
    font-size: clamp(14px, 2vw, 18px);
    color: rgba(255,255,255,0.55);
    margin-bottom: 36px;
    letter-spacing: 2px;
    font-weight: 300;
  }
  .hero-divider {
    width: 80px; height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 0 auto;
  }


  .filter-bar {
    background: #fff;
    border-bottom: 1px solid rgba(0,0,0,0.08);
    padding: 12px 32px;
    display: flex;
    flex-direction: column;
    gap: 0;
    position: sticky;
    top: 0;
    z-index: 100;
    box-shadow: 0 2px 12px rgba(0,0,0,0.06);
  }
  .filter-row {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    align-items: center;
    padding: 7px 0;
  }
  .filter-row + .filter-row {
    border-top: 1px solid rgba(0,0,0,0.06);
  }
  .filter-label { font-size: 11px; color: #999; letter-spacing: 1px; margin-right: 4px; font-weight: 500; white-space: nowrap; }
  .filter-btn {
    border: 1px solid #ddd;
    background: transparent;
    padding: 5px 14px;
    border-radius: 20px;
    font-size: 12px;
    font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer;
    transition: all 0.2s;
    color: #555;
    white-space: nowrap;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--gold); }
  .filter-btn.active { background: var(--deep); border-color: var(--deep); color: #fff; }
  .year-btn.active { background: var(--gold); border-color: var(--gold); color: #fff; }

  .timeline-wrap { max-width: 960px; margin: 0 auto; padding: 56px 24px 80px; }

  /* Year section divider */
  .year-section { margin-bottom: 60px; }
  .year-section-header {
    display: flex;
    align-items: center;
    gap: 16px;
    margin-bottom: 32px;
  }
  .year-label {
    font-family: 'Noto Serif TC', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--deep);
    letter-spacing: 2px;
    white-space: nowrap;
  }
  .year-label span { color: var(--gold); font-size: 26px; }
  .year-section-line { flex: 1; height: 2px; background: linear-gradient(90deg, var(--border), transparent); }
  .year-count { font-size: 12px; color: #bbb; white-space: nowrap; }

  .month-group { margin-bottom: 40px; animation: fadeUp 0.45s ease both; }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .month-header { display: flex; align-items: center; gap: 14px; margin-bottom: 16px; }
  .month-badge {
    background: var(--deep);
    color: #fff;
    font-family: 'Noto Serif TC', serif;
    font-size: 12px;
    font-weight: 600;
    padding: 6px 26px 6px 16px;
    letter-spacing: 2px;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 50%, calc(100% - 10px) 100%, 0 100%);
    white-space: nowrap;
  }
  .month-line { flex: 1; height: 1px; background: linear-gradient(90deg, var(--border), transparent); }
  .month-count { font-size: 11px; color: #ccc; white-space: nowrap; }

  .event-card { display: grid; grid-template-columns: 100px 1fr; margin-bottom: 8px; animation: fadeUp 0.4s ease both; }
  .event-date { text-align: right; padding: 14px 20px 14px 0; position: relative; }
  .event-date::after {
    content: '';
    position: absolute;
    right: 0; top: 50%;
    transform: translateY(-50%);
    width: 10px; height: 10px;
    background: #fff;
    border: 2px solid var(--gold);
    border-radius: 50%;
    z-index: 2;
  }
  .event-date-text { font-family: 'Noto Serif TC', serif; font-size: 12px; color: #999; }
  .event-body { border-left: 1px solid var(--border); padding: 14px 0 14px 24px; }
  .event-content {
    background: #fff;
    border: 1px solid rgba(0,0,0,0.07);
    border-radius: 6px;
    padding: 14px 18px;
    font-size: 14px;
    line-height: 1.7;
    color: #333;
    border-left: 3px solid transparent;
    transition: all 0.2s;
  }
  .event-content:hover { box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-left-color: var(--gold); transform: translateX(2px); }

  .cat-award .event-content    { border-left-color: #c9a84c; }
  .cat-visit .event-content    { border-left-color: #4a90c9; }
  .cat-training .event-content { border-left-color: #4caf8a; }
  .cat-cert .event-content     { border-left-color: #9b59b6; }
  .cat-forum .event-content    { border-left-color: #e67e22; }
  .cat-internal .event-content { border-left-color: #7f8c8d; }

  .event-tag {
    display: inline-block;
    font-size: 10px;
    padding: 2px 8px;
    border-radius: 10px;
    margin-bottom: 5px;
    font-weight: 500;
    letter-spacing: 0.5px;
  }
  .cat-award .event-tag    { background: #fef9ec; color: #c9a84c; }
  .cat-visit .event-tag    { background: #eaf4fb; color: #2980b9; }
  .cat-training .event-tag { background: #eafaf1; color: #27ae60; }
  .cat-cert .event-tag     { background: #f5eef8; color: #8e44ad; }
  .cat-forum .event-tag    { background: #fef5ec; color: #d35400; }
  .cat-internal .event-tag { background: #f4f6f7; color: #606f7b; }

  .empty-state { text-align: center; padding: 80px 20px; color: #bbb; }
  .empty-state .icon { font-size: 48px; margin-bottom: 16px; }


  /* MODAL */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(10,20,40,0.75);
    z-index: 1000;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(4px);
    animation: fadeIn 0.2s ease;
  }
  .modal-overlay.open { display: flex; }
  @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
  .modal-box {
    background: #fff;
    border-radius: 12px;
    max-width: 700px;
    width: 92%;
    overflow: hidden;
    box-shadow: 0 24px 80px rgba(0,0,0,0.4);
    animation: slideUp 0.25s ease;
    position: relative;
  }
  @keyframes slideUp { from { opacity:0; transform:translateY(24px); } to { opacity:1; transform:translateY(0); } }
  .modal-img {
    width: 100%;
    max-height: 420px;
    object-fit: cover;
    display: block;
    background: #eee;
  }
  .modal-body { padding: 22px 28px 28px; }
  .modal-date {
    font-family: 'Noto Serif TC', serif;
    font-size: 12px;
    color: var(--gold);
    letter-spacing: 2px;
    margin-bottom: 8px;
  }
  .modal-title {
    font-family: 'Noto Serif TC', serif;
    font-size: 17px;
    font-weight: 600;
    color: var(--ink);
    line-height: 1.6;
  }
  .modal-close {
    position: absolute;
    top: 12px; right: 14px;
    width: 32px; height: 32px;
    background: rgba(0,0,0,0.45);
    border: none;
    border-radius: 50%;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.2s;
    z-index: 2;
  }
  .modal-close:hover { background: rgba(0,0,0,0.7); }
  .has-modal { cursor: pointer; }
  .has-modal .event-content { border-left-color: var(--gold) !important; }

  .page-footer {
    background: var(--deep);
    color: rgba(255,255,255,0.35);
    text-align: center;
    font-size: 12px;
    letter-spacing: 1px;
    padding: 32px;
    border-top: 1px solid rgba(201,168,76,0.2);
  }
  .page-footer span { color: var(--gold); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--cream); }
  ::-webkit-scrollbar-thumb { background: var(--gold); border-radius: 3px; }

  @media (max-width: 600px) {
    .hero { padding: 56px 16px 44px; }
    .filter-bar { padding: 10px 12px; }
    .timeline-wrap { padding: 36px 10px 60px; }
    .event-card { grid-template-columns: 68px 1fr; }
    .hero-stats { gap: 24px; }
    .stat-num { font-size: 26px; }
  }
</style>
</head>

function buildTimeline() {
  const tl = document.getElementById('timeline');
  tl.innerHTML = '';
  let total = 0;

  const activeYears = currentYear === 'all' ? years : years.filter(y => y === currentYear);

  activeYears.forEach((year, yi) => {
    const events = allData[year] || [];
    const filtered = currentCat === 'all' ? events : events.filter(e => e.cat === currentCat);
    if (!filtered.length) return;
    total += filtered.length;

    const section = document.createElement('div');
    section.className = 'year-section';
    section.innerHTML = `
      <div class="year-section-header">
        <div class="year-label">民國 <span>${year}</span> 年</div>
        <div class="year-section-line"></div>
        <div class="year-count">${filtered.length} 則</div>
      </div>`;

    const grouped = {};
    filtered.forEach(ev => {
      const m = ev.date.split('/')[1] || '00';
      if (!grouped[m]) grouped[m] = [];
      grouped[m].push(ev);
    });

    Object.keys(grouped).sort((a,b) => b-a).forEach((month, mi) => {
      const evs = grouped[month];
      const group = document.createElement('div');
      group.className = 'month-group';
      group.style.animationDelay = (yi*0.06 + mi*0.04) + 's';
      group.innerHTML = `
        <div class="month-header">
          <div class="month-badge">${monthNames[month] || month+'月'}</div>
          <div class="month-line"></div>
          <div class="month-count">${evs.length} 則</div>
        </div>`;
      evs.forEach((ev, ei) => {
        const p = ev.date.split('/');
        const card = document.createElement('div');
        card.className = `event-card cat-${ev.cat}`;
        card.style.animationDelay = (yi*0.05 + mi*0.03 + ei*0.015) + 's';
        const hasImg = !!eventImages[ev.text];
        const hasLink = !!eventLinks[ev.text];
        if (hasImg || hasLink) card.classList.add('has-modal');
        if (hasImg && !hasLink) card.addEventListener('click', () => openModal(ev.text, ev.date));
        if (hasLink) card.addEventListener('click', () => window.open(eventLinks[ev.text], '_blank'));
        card.innerHTML = `
          <div class="event-date"><div class="event-date-text">${p[1]}/${p[2]}</div></div>
          <div class="event-body">
            <div class="event-content">
              <div style="display:flex;align-items:center;gap:6px;margin-bottom:5px;">
                <div class="event-tag">${catLabels[ev.cat]||ev.cat}</div>
                ${hasImg ? '<span style="font-size:10px;color:#aaa;">🖼 圖片</span>' : ''}
                ${hasLink ? '<span style="font-size:10px;color:#4a90c9;">🔗 連結</span>' : ''}
              </div>
              <div>${ev.text}</div>
            </div>
          </div>`;
        group.appendChild(card);
      });
      section.appendChild(group);
    });

    tl.appendChild(section);
  });

  if (!total) {
    tl.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><p>此篩選條件下無相符事件</p></div>`;
  }

}

function filterCat(cat, btn) {
  currentCat = cat;
  document.querySelectorAll('.filter-row:first-child .filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildTimeline();
}

function filterYear(year, btn) {
  currentYear = year;
  document.querySelectorAll('.year-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  buildTimeline();
}

buildTimeline();
</script>
